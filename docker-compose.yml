# Workfolio 앱 + DB 전용 (모니터링 인프라는 docker-infra-compose.yml 사용)
# 사용법:
#   1. docker network create server-network  (최초 1회)
#   2. docker compose -f docker-infra-compose.yml up -d  (모니터링 먼저)
#   3. docker compose up -d

services:
  workfolio-server:
    image: workfolio-server:local
    container_name: workfolio-server
    ports:
      - "9000:9000"
    env_file:
      - docker-compose.env
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - server-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - ./docker-compose.env
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Skrbxo123!@#"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=2621kB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
    networks:
      - server-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectrum -d workfolio"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres-data:

networks:
  server-network:
    external: true
