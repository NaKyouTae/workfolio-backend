# Workfolio 모니터링 인프라 (Prometheus + Grafana + Loki + Promtail + Tempo)
# 사용법:
#   1. docker network create server-network  (최초 1회)
#   2. docker compose -f docker-infra-compose.yml up -d
#   3. docker compose up -d  (앱 + DB)

name: workfolio

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    networks:
      - server-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    env_file:
      - docker-compose.env
    environment:
      - GF_SECURITY_ADMIN_USER=workfolio
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3200
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Asia/Seoul
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3200:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - server-network
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    volumes:
      - ./monitoring/tempo/tempo-config.yml:/etc/tempo/config.yml
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/config.yml
    ports:
      - "4317:4317"    # OTLP gRPC (Spring Boot -> Tempo)
      - "4318:4318"    # OTLP HTTP
    depends_on:
      - prometheus
    networks:
      - server-network
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    networks:
      - server-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - server-network
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

networks:
  server-network:
    external: true
