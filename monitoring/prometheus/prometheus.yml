global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Workfolio API
  - job_name: "workfolio-api"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["workfolio-server:9000"]
        labels:
          environment: "local"
          application: "workfolio-api"

  # Prometheus 자체 메트릭
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Loki 메트릭
  - job_name: "loki"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          application: "loki"
