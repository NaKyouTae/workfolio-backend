server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # Docker 컨테이너 자동 수집 (workfolio)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: network
            values: ["server-network"]

    relabel_configs:
      # 컨테이너 이름을 라벨로 추가
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"

      # 프로젝트 라벨
      - source_labels: ["__meta_docker_container_name"]
        regex: "(workfolio.*)"
        target_label: "project"
        replacement: "workfolio"

      # 앱 컨테이너만 수집
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(workfolio-server)"
        action: keep

    pipeline_stages:
      - docker: {}

      # Spring Boot 로그 레벨 추출
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2}T?\s?\d{2}:\d{2}:\d{2}[\.,]\d{3})\s+(?P<level>\w+)\s+(?P<pid>\d+)\s+---\s+\[(?P<thread>[^\]]+)\]\s+(?P<logger>[^\s]+)\s+:\s+(?P<message>.*)'

      - labels:
          level:
          logger:

      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000"
          fallback_formats:
            - "2006-01-02 15:04:05.000"
