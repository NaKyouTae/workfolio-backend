apiVersion: 1

datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "10s"
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: Tempo

  - name: Tempo
    uid: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: Loki
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: "service.name"
            value: "service_name"
      tracesToMetrics:
        datasourceUid: Prometheus
        tags:
          - key: "service.name"
            value: "application"
      serviceMap:
        datasourceUid: Prometheus
      nodeGraph:
        enabled: true

  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: "traceId=([\\w]+)"
          url: "$${__value.raw}"
          datasourceUid: Tempo
          urlDisplayLabel: "Trace 조회"
